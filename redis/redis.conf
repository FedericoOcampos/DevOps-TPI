# Redis configuration for Render deployment

# Network configuration
bind 0.0.0.0
port 6379

# Security
protected-mode no
requirepass ""

# Memory management
maxmemory 128mb
maxmemory-policy allkeys-lru

# Persistence (importante para no perder datos)
save 900 1
save 300 10
save 60 10000

# Database
databases 16

# Logging
loglevel notice
logfile ""

# Performance
tcp-keepalive 300
timeout 0

# Snapshots
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Append only file (más seguridad de datos)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128