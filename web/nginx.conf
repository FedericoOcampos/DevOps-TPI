events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Configuración de logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Configuración de compresión
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json;

    server {
        listen RENDER_PORT;
        server_name _;
        
        # Directorio raíz donde están los archivos estáticos
        root /usr/share/nginx/html;
        index index.html index.htm;

        # Configuración para servir archivos estáticos
        location / {
            try_files $uri $uri/ /index.html;
            
            # Headers para cacheo
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # Headers de seguridad
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Opcional: Proxy a la API si necesitas evitar CORS
        # (Descomenta si prefieres hacer requests a /api/ en lugar de al dominio completo)
        # location /api/ {
        #     proxy_pass https://tu-proyecto-api.onrender.com/;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        # }
    }
}